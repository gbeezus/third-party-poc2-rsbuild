services:
  - type: web
    runtime: static
    name: third-party-poc2-rsbuild
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    # Federation chunks must be loadable cross-origin by the host
    # (shell-poc2-rsbuild). Without these headers the browser fetches
    # remoteEntry.js with 200 but refuses to evaluate it.
    headers:
      - path: /*
        name: Access-Control-Allow-Origin
        value: '*'
      - path: /*
        name: Access-Control-Allow-Methods
        value: 'GET, OPTIONS'
    envVars:
      - key: NODE_VERSION
        value: '24'
      # Federation chunks must be loaded from this remote's URL, not
      # from the host's. Without an absolute assetPrefix, the manifest
      # contains relative paths like /static/js/.../Tool.xxx.js, and the
      # host fetches them against ITS own origin. Setting this to the
      # full deployed URL makes the manifest fully-qualified.
      #
      # IMPORTANT: this must match this service's actual deployed URL.
      # Update if Render assigns a different hostname.
      - key: PUBLIC_ASSET_PREFIX
        value: https://third-party-poc2-rsbuild.onrender.com/
    # After deploy, copy the URL of this service + /remoteEntry.js and
    # set it as PUBLIC_REMOTE_URL on shell-poc2-rsbuild (then redeploy
    # the shell so the new URL is baked into its bundle).
